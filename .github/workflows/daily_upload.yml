name: 🎬 YouTube Shorts Daily Upload

on:
  # Run every day at 12:00 UTC (5:30pm IST)
  schedule:
    - cron: "0 12 * * *"

  # Also lets you trigger manually from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

jobs:
  upload-short:
    name: Generate & Upload YouTube Short
    runs-on: ubuntu-latest   # Free, unlimited on public repos
    timeout-minutes: 20      # Safety cap — whole pipeline takes ~5-8 min

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install FFmpeg ──────────────────────────────────────────────────
      - name: 🎞️ Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── 3. Set up Python ───────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Run the pipeline ────────────────────────────────────────────────
      - name: 🚀 Run YouTube Shorts pipeline
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      # ── 6. Upload log as artifact (viewable in Actions tab) ────────────────
      - name: 📊 Upload run log
        if: always()   # upload even if the job failed
        uses: actions/upload-artifact@v4
        with:
          name: upload-log-${{ github.run_id }}
          path: upload_log.csv
          retention-days: 30
          if-no-files-found: ignore
