name: ⏰ Keep Alive

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflow alive
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit --allow-empty -m "chore: keep alive $(date -u '+%Y-%m-%d')"
          git push
